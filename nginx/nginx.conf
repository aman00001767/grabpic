upstream app_server {
    server app:8000;
}

# ── Redirect HTTP → HTTPS (enabled after SSL setup) ──
# server {
#     listen 80;
#     server_name YOUR_DOMAIN;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name _;

    # Certbot challenge (uncomment when setting up SSL)
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }

    # ── Max upload size (photos can be large) ──
    client_max_body_size 50M;

    # ── Gzip compression ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Security headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API routes → FastAPI ──
    location /api/ {
        proxy_pass http://app_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Upload timeout (face processing can take a while)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Auth, upload, search, share, docs routes → FastAPI ──
    location ~ ^/(register|login|upload-event-photos|search|events|share|docs|openapi.json|redoc) {
        proxy_pass http://app_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Everything else → FastAPI (which serves SPA) ──
    location / {
        proxy_pass http://app_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

